name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable via spec file
        run: |
          pyinstaller --noconfirm ZeddiHubTools.spec

      - name: Verify build output
        run: |
          if (Test-Path "dist/ZeddiHubTools.exe") {
            Write-Host "Build successful: dist/ZeddiHubTools.exe"
            Get-Item "dist/ZeddiHubTools.exe" | Select-Object Name, Length
          } else {
            Write-Error "Build failed: ZeddiHubTools.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZeddiHubTools
          path: dist/ZeddiHubTools.exe
          retention-days: 30

      - name: Resolve release notes file
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $candidate = "RELEASE_NOTES_$tag.md"
          if (Test-Path $candidate) {
            echo "path=$candidate" >> $env:GITHUB_OUTPUT
            echo "found=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "found=false" >> $env:GITHUB_OUTPUT
          }

      - name: Create Release (with notes file)
        if: startsWith(github.ref, 'refs/tags/') && steps.notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ZeddiHubTools.exe
          name: "ZeddiHub Tools Desktop ${{ github.ref_name }}"
          body_path: ${{ steps.notes.outputs.path }}
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (fallback body)
        if: startsWith(github.ref, 'refs/tags/') && steps.notes.outputs.found == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ZeddiHubTools.exe
          name: "ZeddiHub Tools Desktop ${{ github.ref_name }}"
          body: |
            ## ZeddiHub Tools Desktop ${{ github.ref_name }}

            ### Download
            Stahnete `ZeddiHubTools.exe` nize a spustte primo — neni potreba instalace.

            ### Changelog
            Viz [version.json](version.json).
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
