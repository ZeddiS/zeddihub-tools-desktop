name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pillow cryptography psutil pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed `
            --icon=assets/icon.ico `
            --name "ZeddiHub.Tools" `
            --add-data "assets;assets" `
            --add-data "locale;locale" `
            --add-data "version.json;." `
            app.py

      - name: Verify build output
        run: |
          if (Test-Path "dist/ZeddiHub.Tools.exe") {
            Write-Host "Build successful: dist/ZeddiHub.Tools.exe"
            Get-Item "dist/ZeddiHub.Tools.exe" | Select-Object Name, Length
          } else {
            Write-Error "Build failed: ZeddiHub.Tools.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZeddiHub.Tools
          path: dist/ZeddiHub.Tools.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ZeddiHub.Tools.exe
          name: "ZeddiHub Tools ${{ github.ref_name }}"
          body: |
            ## ZeddiHub Tools ${{ github.ref_name }}

            ### Download
            Download `ZeddiHub.Tools.exe` below and run it directly — no installation required.

            ### Changelog
            See [version.json](version.json) for release notes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
