name: Build & Release ZeddiHub Tools

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download assets
      run: |
        mkdir -p assets
        python -c "
        import urllib.request
        try:
            urllib.request.urlretrieve('https://files.zeddihub.eu/logo.png', 'assets/banner.png')
            urllib.request.urlretrieve('https://files.zeddihub.eu/logo2.png', 'assets/logo.png')
            print('Assets downloaded')
        except Exception as e:
            print(f'Asset download failed: {e}')
        "

    - name: Generate icon
      run: |
        python -c "
        from PIL import Image, ImageDraw
        import os
        os.makedirs('assets', exist_ok=True)
        img = Image.new('RGBA', (256, 256), (0,0,0,0))
        draw = ImageDraw.Draw(img)
        draw.ellipse([8,8,248,248], fill='#e07b39', outline='#c96b29', width=6)
        sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
        icons = [img.resize(s, Image.LANCZOS) for s in sizes]
        icons[0].save('assets/icon.ico', format='ICO', append_images=icons[1:])
        print('Icon generated')
        "

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed ^
          --name "ZeddiHub Tools" ^
          --icon "assets/icon.ico" ^
          --add-data "assets;assets" ^
          --add-data "zeddihub_cs2_tools;zeddihub_cs2_tools" ^
          --add-data "zeddihub_csgo_tools;zeddihub_csgo_tools" ^
          --add-data "zeddihub_rust_editor;zeddihub_rust_editor" ^
          --add-data "zeddihub_translator;zeddihub_translator" ^
          --add-data "zeddihub_server_status;zeddihub_server_status" ^
          --add-data "gui;gui" ^
          --hidden-import customtkinter ^
          --hidden-import PIL ^
          --hidden-import cryptography ^
          app.py
      shell: cmd

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Rename artifact
      run: |
        mv "dist/ZeddiHub Tools.exe" "dist/ZeddiHubTools_v${{ steps.version.outputs.VERSION }}.exe"
      shell: bash

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: ZeddiHub Tools ${{ github.ref_name }}
        body: |
          ## ZeddiHub Tools ${{ github.ref_name }}

          ### Stažení
          Stáhněte `ZeddiHubTools_v${{ steps.version.outputs.VERSION }}.exe` níže.

          ### Poznámky k vydání
          Viz [CHANGELOG.md](./CHANGELOG.md) pro seznam změn.

          ---
          *Vytvořeno automaticky GitHub Actions*
        files: |
          dist/ZeddiHubTools_v${{ steps.version.outputs.VERSION }}.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
